# Пайплайн SUMMER — летняя промоакция: состояния клиентов + участия (promotions_prod)
# JOIN клиент/услуги из Impala (crm2 + drb). Второй дашборд рядом с заказами.
# Postgres-источник ходит в ДРУГУЮ базу (env_prefix: SUMMER_PG в .env).

output_subdir: summer                 # data/summer/snapshot.parquet + meta.json
output_dataset: snapshot

combine: duckdb_join
driver: summer                        # из него — pushdown customer_id в Impala
assemble_file: assemble_summer.sql

sources:
  - name: summer                      # Postgre promotions_prod — драйвер
    type: postgres
    env_prefix: SUMMER_PG             # SUMMER_PG_HOST/_DBNAME/_USER/... в .env
    query_file: pg_summer.sql

  - name: customers                   # Impala — клиент + has_services (только участники)
    type: impala
    query_file: impala_summer_customers.sql

validation:
  expected_columns: [report_period_id, entry_date, id, customer_id,
                     eligibility_status, participation_number, promo_code,
                     name, identification_number, mobile_phone, has_services]
  min_rows: 1
  max_rows: 500000

# Исходные таблицы (summer, customers) в data/summer/sources/ — для SQL-вкладки.
export_sources: true

# ПЕРСОНАЛЬНЫЕ ДАННЫЕ (имя/ИИН/телефон) на публичных Pages — шифрование обязательно.
encrypt: true

# Каждый час, как today.
schedule:
  mode: interval
  interval_minutes: 60

retries:
  attempts: 3
  backoff_seconds: 30

publish:
  mode: git_orphan_pages    # сайт -> ветка gh-pages 1 orphan-коммитом (история не растёт)
  git_remote: origin
  git_branch: gh-pages
